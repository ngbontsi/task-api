name: Deploy to Development

on:
  push:
    branches: [develop]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Package
        run: mvn clean package -DskipTests -q

      - name: Build Docker Image
        run: |
          docker build -t ${{ github.repository }}:dev-${{ github.sha }} .
          docker tag ${{ github.repository }}:dev-${{ github.sha }} ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:dev-latest

      - name: Push to Registry
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin ${{ secrets.DOCKER_REGISTRY }}
          docker push ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:dev-latest

      - name: Deploy to K8s
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            k8s/namespace.yaml
            k8s/config.yaml
            k8s/postgres.yaml
            k8s/kafka.yaml
            k8s/deployment.yaml
            k8s/service.yaml
          images: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:dev-latest
          namespace: task-api-dev
          kubeconfig: ${{ secrets.KUBE_CONFIG_DEV }}
