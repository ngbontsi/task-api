name: Deploy to Production

on:
  release:
    types: [released]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    concurrency: production
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Package
        run: mvn clean package -DskipTests -q

      - name: Build and Tag Docker Image
        run: |
          docker build -t ${{ github.repository }}:prod-${{ github.sha }} .
          docker tag ${{ github.repository }}:prod-${{ github.sha }} ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:prod-latest
          docker tag ${{ github.repository }}:prod-${{ github.sha }} ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}

      - name: Push to Registry
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin ${{ secrets.DOCKER_REGISTRY }}
          docker push ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:prod-latest
          docker push ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}

      - name: Deploy to Production K8s
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            k8s/namespace.yaml
            k8s/config.yaml
            k8s/postgres.yaml
            k8s/kafka.yaml
            k8s/deployment.yaml
            k8s/service.yaml
            k8s/ingress.yaml
          images: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:prod-latest
          namespace: task-api-prod
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: Verify Production
        run: |
          sleep 60
          curl -f https://api.${{ secrets.DOMAIN }}/actuator/health || exit 1

      - name: Notify Success
        if: success()
        run: echo "Deployment successful!"
