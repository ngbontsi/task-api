name: Deploy to Staging

on:
  push:
    tags:
      - 'v*[0-9].*[0-9].*[0-9]'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'maven'

      - name: Get Version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and Package
        run: mvn clean package -DskipTests -q

      - name: Build Docker Image
        run: |
          docker build -t ${{ github.repository }}:staging-${{ github.sha }} .
          docker tag ${{ github.repository }}:staging-${{ github.sha }} ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:staging-latest
          docker tag ${{ github.repository }}:staging-${{ github.sha }} ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}

      - name: Push to Registry
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin ${{ secrets.DOCKER_REGISTRY }}
          docker push ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:staging-latest
          docker push ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}

      - name: Deploy to Staging K8s
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            k8s/namespace.yaml
            k8s/config.yaml
            k8s/postgres.yaml
            k8s/kafka.yaml
            k8s/deployment.yaml
            k8s/service.yaml
            k8s/ingress.yaml
          images: |
            ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository }}:staging-latest
          namespace: task-api-staging
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Run Smoke Tests
        run: |
          sleep 30
          curl -f https://staging.${{ secrets.DOMAIN }}/actuator/health || exit 1
