spring.application.name=task-api
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:taskdb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:create-drop}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}

spring.jpa.show-sql=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.enabled=false

spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8180/realms/task-api
spring.security.oauth2.client.registration.keycloak.client-id=task-api
spring.security.oauth2.client.registration.keycloak.client-secret=task-api-secret
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
