spring.datasource.url=jdbc:postgresql://db:5432/taskdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=taskuser
spring.datasource.password=taskpass

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.enabled=false

spring.security.oauth2.client.provider.keycloak.issuer-uri=http://keycloak:8080/realms/task-api
spring.security.oauth2.client.registration.keycloak.client-id=task-api
spring.security.oauth2.client.registration.keycloak.client-secret=task-api-secret
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
